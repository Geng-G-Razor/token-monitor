<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Loading state -->
      <section id="view-loading" class="view">
        <div class="spinner"></div>
        <p class="muted">连接中…</p>
      </section>

      <!-- Login view -->
      <section id="view-login" class="view hidden">
        <header class="login-head">
          <div class="logo hidden">¥</div>
          <h1>Token Monitor</h1>
          <p class="muted">登录查看消费与订阅</p>
        </header>
        <form id="login-form" autocomplete="on">
          <label class="field">
            <span>服务地址(有默认值，可不填）</span>
            <input id="base-url" type="url" autocomplete="off" placeholder="sub2api相关的第三方token网站" />
          </label>

          <div class="field-divider"><span>登录方式</span></div>

          <label class="field">
            <span>邮箱</span>
            <input id="email" type="email" autocomplete="username" placeholder="you@example.com" />
          </label>
          <label class="field">
            <span>密码</span>
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
          </label>
          <div class="field-divider"><span>或</span></div>
          <label class="field">
            <span>Authorization Token</span>
            <input id="token" type="text" autocomplete="off" placeholder="Bearer eyJhbGciOiJSUzI1NiI…" />
          </label>
          <p id="login-error" class="error hidden"></p>
          <button id="login-btn" type="submit" class="primary">登录</button>
        </form>
        <button id="quit-btn-login" class="ghost quit" style="margin-top:12px">退出应用</button>
      </section>

      <!-- Dashboard view -->
      <section id="view-dash" class="view hidden">
        <header class="dash-head">
          <div>
            <div class="big-amt" id="today-cost">$0.00</div>
            <div class="label">今日消费</div>
          </div>
          <div id="balance-block" class="hidden">
            <div class="big-amt" id="today-balance">$0.00</div>
            <div class="label">余额</div>
          </div>
          <button id="refresh-btn" class="icon-btn" title="刷新" aria-label="刷新">
            <svg class="ico" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"/>
            </svg>
          </button>
        </header>

        <!-- Stats dashboard -->
        <div class="grid today-grid">
          <div class="cell">
            <div class="num" id="today-req">0</div>
            <div class="label">今日请求</div>
          </div>
          <div class="cell">
            <div class="num" id="rpm">0</div>
            <div class="label">RPM</div>
          </div>
          <div class="cell">
            <div class="num" id="tpm">0</div>
            <div class="label">TPM</div>
          </div>
          <div class="cell">
            <div class="num" id="avg-dur">0s</div>
            <div class="label">平均耗时</div>
          </div>
        </div>

        <div class="section-title">累计</div>
        <div class="grid total-grid">
          <div class="cell">
            <div class="num" id="total-cost">$0.00</div>
            <div class="label">总消费</div>
          </div>
          <div class="cell">
            <div class="num" id="total-tokens">0</div>
            <div class="label">总 Token</div>
          </div>
          <div class="cell">
            <div class="num" id="total-req">0</div>
            <div class="label">总请求</div>
          </div>
        </div>

        <div class="section-title">按平台</div>
        <div id="platforms" class="platforms"></div>

        <!-- Subscription section -->
        <div class="section-title" style="margin-top: 16px;">订阅</div>
        <div id="sub-cards" class="sub-cards">
          <p class="muted" id="sub-empty">暂无订阅</p>
        </div>

        <footer class="dash-foot">
          <select id="interval">
            <option value="60000" selected>每 1 分钟</option>
            <option value="300000">每 5 分钟</option>
            <option value="600000">每 10 分钟</option>
            <option value="1800000">每 30 分钟</option>
          </select>
          <span class="muted" id="updated-at">—</span>
          <div class="foot-actions">
            <button id="logout-btn" class="ghost">登出</button>
            <button id="quit-btn" class="ghost quit">退出</button>
          </div>
        </footer>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
